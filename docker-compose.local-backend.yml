services:
  backend:
    profiles:
      - docker-backend

  frontend:
    volumes:
      - ./nginx/nginx.local-backend.conf:/etc/nginx/conf.d/default.conf
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - go2rtc

  telegram-bot:
    environment:
      - API_BASE_URL=http://host.docker.internal:5002
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on: []
