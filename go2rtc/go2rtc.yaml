log:
  level: info

api:
  listen: ":1984"

# Low-latency RTSP server for worker process
rtsp:
  listen: ":8554"
  timeout: 5s

# WebRTC for browser (UDP preferred for lower latency)
webrtc:
  listen: ":8555"
  candidates:
    - udp
    - tcp

# MJPEG fallback for compatibility
mjpeg:
  listen: ":8556"

# HLS for hybrid approach (fast delivery)
hls:
  listen: ":8857"
  segment_duration: 1
  part_duration: 200ms

# Streams are configured dynamically via the go2rtc API
# When cameras are added through the web UI, they are automatically registered here
streams: {}
