log:
  level: info

api:
  listen: ":1984"

rtsp:
  listen: ":8554"
  timeout: 10s

ffmpeg:
  bin: /usr/bin/ffmpeg
  # Optimized H264 transcoding: ultrafast preset, minimal GOP, zero latency
  h264: >-
    -c:v libx264
    -g 20
    -preset ultrafast
    -tune zerolatency
    -pix_fmt yuv420p
    -bf 0
    -an

streams: {}
