log:
  level: info

api:
  listen: ":1984"

rtsp:
  listen: ":8554"
  timeout: 5s

# MSE over WebSocket is the primary streaming method (0.5-1s latency)
# WebRTC disabled — MSE provides reliable low-latency without STUN/TURN

# MJPEG fallback for compatibility
mjpeg:
  listen: ":8556"

# HLS for mobile/edge cases
hls:
  listen: ":8857"
  segment_duration: 1
  part_duration: 200ms

# Streams are configured dynamically via the go2rtc API
# When cameras are added through the web UI, they are automatically registered here
streams: {}
